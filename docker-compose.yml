services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: archgen
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U postgres"], interval: 10s, timeout: 5s, retries: 5 }
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes: ["redis_data:/data"]
  backend:
    build: ./backend
    env_file: .env
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_started } }
    ports: ["8000:8000"]
  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    depends_on: [backend]
    ports: ["3000:3000"]
  nginx:
    image: nginx:1.27-alpine
    volumes: ["./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro"]
    depends_on: [frontend, backend]
    ports: ["8080:80"]
volumes:
  postgres_data:
  redis_data:
